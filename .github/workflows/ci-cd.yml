name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arvexo-study-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8001
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: arvexo_study_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://127.0.0.1:8001 \
            --build-arg NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=arvexo_study_bot \
            -t arvexo-study-frontend:ci ./frontend

      - name: Build backend image
        run: docker build -t arvexo-study-backend:ci ./backend

      - name: Build bot image
        run: docker build -t arvexo-study-bot:ci ./bot

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build --remove-orphans
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8001/health; then
                break
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml --env-file .env exec -T backend python scripts/import_tasks.py data/task.json
            curl -fsS http://127.0.0.1:8001/health
