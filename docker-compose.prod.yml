services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:?NEXT_PUBLIC_TELEGRAM_BOT_USERNAME is required}
    container_name: arvexo-study-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:?NEXT_PUBLIC_TELEGRAM_BOT_USERNAME is required}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: arvexo-study-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:?PUBLIC_SITE_URL is required}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
    volumes:
      - ./data:/app/data:ro
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: ./bot
    container_name: arvexo-study-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: arvexo-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arvexo-study-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
