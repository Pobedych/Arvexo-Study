services:
  frontend:
    build:
      context: ./frontend
    container_name: arvexo-study-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.study.arvexo.ru
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: arvexo-study-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  bot:
    build:
      context: ./bot
    container_name: arvexo-study-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: arvexo-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arvexo_study
      POSTGRES_USER: arvexo
      POSTGRES_PASSWORD: arvexo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    container_name: arvexo-study-redis
    restart: unless-stopped
    ports:
      - "6381:6379"

volumes:
  postgres-data:
